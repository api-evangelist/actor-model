naftiko: "1.0.0-alpha1"

info:
  label: "Actor System Management"
  description: "Workflow for managing actor lifecycle, message passing, supervision hierarchies, and cluster operations in distributed actor model systems. Used by platform engineers and distributed systems developers."
  tags:
    - Actor Model
    - Concurrency
    - Distributed Systems
    - Supervision
    - Cluster Management
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ACTOR_SYSTEM_API_TOKEN: ACTOR_SYSTEM_API_TOKEN

capability:
  consumes:
    - import: actor-model
      location: ./shared/actor-model.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: actor-system-api
      description: "Unified REST API for actor system management."
      resources:
        - path: /v1/actors
          name: actors
          description: "Actor lifecycle management"
          operations:
            - method: GET
              name: list-actors
              description: "List all active actors"
              call: "actor-model.list-actors"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: spawn-actor
              description: "Spawn a new actor"
              call: "actor-model.spawn-actor"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/health
          name: health
          description: "System health status"
          operations:
            - method: GET
              name: get-health
              description: "Get system health"
              call: "actor-model.get-health"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: actor-system-mcp
      transport: http
      description: "MCP server for AI-assisted actor system management and observability."
      tools:
        - name: list-actors
          description: "List all actors in the system filtered by status"
          hints:
            readOnly: true
            openWorld: true
          call: "actor-model.list-actors"
          with:
            status: "tools.status"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-actor
          description: "Get details of a specific actor including mailbox size and restart count"
          hints:
            readOnly: true
            openWorld: false
          call: "actor-model.get-actor"
          with:
            actorId: "tools.actorId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: send-message
          description: "Send a typed message to an actor's mailbox for asynchronous processing"
          hints:
            readOnly: false
            openWorld: true
          call: "actor-model.send-message"
          with:
            actorId: "tools.actorId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: inspect-mailbox
          description: "Inspect pending messages in an actor's mailbox for debugging"
          hints:
            readOnly: true
            openWorld: false
          call: "actor-model.inspect-mailbox"
          with:
            actorId: "tools.actorId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-supervisors
          description: "List supervisors with their strategies and child actor counts"
          hints:
            readOnly: true
            openWorld: true
          call: "actor-model.list-supervisors"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-cluster-members
          description: "List all cluster nodes with their status, roles, and actor counts"
          hints:
            readOnly: true
            openWorld: true
          call: "actor-model.list-cluster-members"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-health
          description: "Get actor system health including throughput, error rate, and dead letter count"
          hints:
            readOnly: true
            openWorld: true
          call: "actor-model.get-health"
          outputParameters:
            - type: object
              mapping: "$."
